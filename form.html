<doctype html>
	<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Form</title>
	
		<style>
			*{
				margin: 0;
				padding: 0;
			}
			.f{
				display: flex;
				justify-content: center;
			
				
				

			}
			h2{
				color: blue;
				font-weight: bold;
				font-size: 40px;
				
			}
			p{
			     font-size: 25px;
				font-style: italic;
				
				
			}
			
			
            body{
				height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
				
			}
            h1{
            font-size: 15px;
            font-style: italic;
            color: blue;
            display: flex;
            justify-content: center;
            
            }
			form{
				

			
		
				
				display: flex;
				flex-direction: column;
				gap: 20px;
                background-color:white;
				
				
			
				width: 300px;
				height: 350px;
				padding: 50px;

                
			
			}
			input{
				
				height:50px;
                width:100%;
                font-style:italic;
                padding: 15px;
                font-size: 17px;
            
                box-sizing: border-box;
            }
            #account
            {
                background-color: green;
                color: white;
                font-weight: bold;
		
				
    
			}
			#login
			{
				background-color: blue;
				font-size: large;
				color: white;
				font-weight: bold;
				text-align: center;

				
				


		
			}
			button{
				background-color:green;
		        color: white;
				padding: 10px;
			
				
			
			}
			a{
				text-decoration: none;
				color: white;
			}
		
			
	  </style>
	
	<body>
		<div class="f">
			
			
			<div class="c">
				<h2>Facebook</h2>
			
			<p>facebook helps you connect and share with the people in your life.</p>
		</div>
	<div id="login">
		<form action="">
			
			<input type="text" placeholder="Email addresss or Number" >
			<input type="password" placeholder="password">

            <button id="login"><a href="https://www.facebook.com/">Log In</a></button>

            <h1> Forgotten password?</h1>
			
            <button id="account"><a href="https://www.facebook.com/reg/?entry_point=login&next=">Create new account</a></button>

           
			
		</form>
	</div>
</body>
</html>
