<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Registration Form</title>
        </head>
        <style>
            body{
                display: flex;
                justify-content: center;
                align-items: center;
                background-color: lightblue;
                background-image:url(p.jpg);
            }
            h1{
                color:black;

            }

                align-items: center;

                font-size: 16px;
                background-color:lavender;
            }

                    </tr>

                
                
                    <td>Name:</td>

                </tr>

                </tr>
                <tr>

                </tr>
                <tr>

                    </tr>
                    
                    <tr>
                        
                       <td><button>Submit</button></td>
                    
                       
                        
                    </tr>
                    </table>
                    </form>
