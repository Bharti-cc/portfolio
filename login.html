<doctype html>
	<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Login form</title>
		<style>
			body{
		
				
				display: flex;
				justify-content: center;
				align-items: center;
				
		
			
				
				
			}
			form{
				
				
				display: flex;
				flex-direction: column;
				gap: 20px;
				background-color: darkslategrey;
			
				width:200px;
				height: 200px;
				padding: 20px;
				border-radius: 20px;
				
			}
			input{
				
				height: 20%;
				margin: 5px;
				
				border-style: none;
				background-color: rgb(240, 221, 224);
				outline: none;
				border-radius: 25px;
				padding-left: 15px;
				font-style: italic;
			}
			input[type=submit]{
				height: 25px;
				margin: 0px auto;
				width: 50%;
			background-color:white;
				box-shadow: 3px 3px 1px paleturquoise) ;
				font-weight: bold;
				font-size: 17px;
				color: black;
				cursor: pointer;
			}

			button{
				padding: 9px;
				border-radius: 25px;
				
				
			}
			
	
			



		</style>
	</head>
	<body>
	
	<div id="login">
		<form action="">
	
			<input type="text" placeholder="USERNAME">
			<input type="password" placeholder="PASSWORD">
			<button>Login</button>
			
		</form>
	</div>
</body>
</html>
